<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Fast Online Street Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">Street Food</a>
        <div id="user-display"></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <h2>My Profile</h2>
        <div class="form-container" style="max-width: 600px;">
            <form onsubmit="updateProfile(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label>Username (Cannot change)</label>
                    <input type="text" id="profile-username" disabled style="background: #eee;">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="profile-contact" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="profile-address" required></textarea>
                </div>
                <div class="form-group">
                    <label>New Password (Leave blank to keep current)</label>
                    <input type="password" id="profile-password">
                </div>
                <button type="submit" class="btn">Update Profile</button>
            </form>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
