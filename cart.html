<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Fast Online Street Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">Street Food</a>
        <div id="user-display"></div>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="container">
        <h2>Your Cart</h2>
        <div id="cart-container">
        </div>
        
        <div style="margin-top: 20px; text-align: right;">
            <h3>Total: <span id="total-price">0</span></h3>
            <form onsubmit="processCheckout(event)" style="max-width: 300px; margin-left: auto;">
                <input type="hidden" id="checkout-total">
                <button type="submit" class="btn" style="margin-top:10px;">Checkout Order</button>
            </form>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
